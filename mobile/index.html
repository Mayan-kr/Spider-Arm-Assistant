<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Agent | Remote Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ef4444; /* Spider Red */
            --accent: #991b1b;  /* Deep Blood Red */
            --bg: #09090b;      /* Deep Black */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(239, 68, 68, 0.2);
            --text-main: #fafafa;
            --text-dim: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 450px;
            height: 100vh; /* Fixed height */
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(20px);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden; /* Prevent entire dashboard from scrolling */
        }

        header {
            text-align: center;
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            font-size: 0.8rem;
            color: #4ade80;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        .command-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button.send-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 0.75rem;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button.send-btn:active {
            transform: scale(0.9);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .action-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .action-btn .icon {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .action-btn .label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .history-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            padding: 1rem 0;
        }

        .message {
            max-width: 85%;
            padding: 1rem;
            border-radius: 1.25rem;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: slide-up 0.4s ease-out;
            word-break: break-word; /* Fix for long strings/JSON */
            overflow-wrap: anywhere;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            border-bottom-right-radius: 0.25rem;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 0.25rem;
        }

        .message .time {
            display: block;
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 0.4rem;
        }

        /* Modal / Safety */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 2rem;
        }

        .modal {
            background: #1e1b4b;
            border: 2px solid #ef4444;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            max-width: 350px;
        }

        .modal h2 { margin-bottom: 1rem; font-size: 1.25rem; }
        .modal p { color: var(--text-dim); margin-bottom: 1.5rem; font-size: 0.9rem; }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .modal-actions button {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-approve { background: #10b981; color: white; }
        .btn-reject { background: #ef4444; color: white; }

        /* Login Screen */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #09090b;
            background-image: radial-gradient(circle at center, #450a0a 0%, #09090b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 2rem;
            padding: 3rem 2rem;
            backdrop-filter: blur(20px);
            max-width: 400px;
            width: 100%;
        }

        .google-btn {
            background: white;
            color: #1f2937;
            border: none;
            padding: 1rem 2rem;
            border-radius: 999px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            margin-top: 2rem;
            transition: transform 0.2s;
        }

        .google-btn:hover { transform: scale(1.02); }
        .google-btn img { width: 20px; }

    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h1 style="color: white; margin-bottom: 0.5rem;">Spider-ARM</h1>
            <p style="color: var(--text-dim); font-size: 0.9rem;">Authentication Required</p>
            <button class="google-btn" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/01/2x/google_signin_buttons/google-icon.png" alt="Google">
                Sign in with Google
            </button>
        </div>
    </div>

    <div class="phone-container" style="display: none;" id="mainDashboard">
        <header>
            <h1>Spider-ARM</h1>
            <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: -0.5rem; margin-bottom: 0.75rem; font-weight: 500; letter-spacing: 1px;">NEURAL CORE: QWEN-1.5B</div>
            <div class="status-badge" id="statusBadge">
                <div class="pulse" id="statusPulse"></div> <span id="statusLabel">Agent Offline</span>
            </div>
        </header>

        <div class="history-container" id="history">
            <div class="message bot">
                Hey Kumar! I'm ready to assist with your PC.
                <span class="time">09:00 AM</span>
            </div>
        </div>

        <div class="quick-actions">
            <div class="action-btn" onclick="quickCmd('Take a screenshot')">
                <span class="icon">📸</span>
                <span class="label">Screenshot</span>
            </div>
            <div class="action-btn" onclick="quickCmd('Give me a full system info report')">
                <span class="icon">📊</span>
                <span class="label">PC Stats</span>
            </div>
            <div class="action-btn" onclick="quickCmd('Open calculator')">
                <span class="icon">🧮</span>
                <span class="label">App Launch</span>
            </div>
            <div class="action-btn" onclick="quickCmd('Type Success!')">
                <span class="icon">⌨️</span>
                <span class="label">Type Text</span>
            </div>
        </div>

        <div class="command-card">
            <div class="input-group">
                <input type="text" id="cmdInput" placeholder="Send a command..." onkeydown="if(event.key === 'Enter') sendCommand()">
                <button class="send-btn" onclick="sendCommand()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
        
        <footer style="text-align: center; padding-top: 1rem; opacity: 0.8;">
            <a href="https://github.com/Mayan-kr" target="_blank" style="text-decoration: none; color: white; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;">
                <span style="opacity: 0.6;">Architect:</span> 
                <span style="font-weight: 700; color: var(--primary);">Mayan-kr</span>
                <span style="background: white; color: black; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px;">➔</span>
            </a>
        </footer>
    </div>

    <!-- Safety Confirmation Modal -->
    <div id="safetyModal" class="modal-overlay">
        <div class="modal">
            <h2 style="color: #ef4444;">🛡️ Security Alert</h2>
            <p id="safetyMsg">The agent wants to delete a file. Do you approve?</p>
            <div class="modal-actions">
                <button class="btn-approve" onclick="confirmSafety(true)">Approve</button>
                <button class="btn-reject" onclick="confirmSafety(false)">Deny</button>
            </div>
        </div>
    </div>

    <!-- Firebase Logic (Ready to Plug) -->
    <script type="module">
        // Live Firebase configuration
        // /* FIREBASE_CONFIG_START */
        const firebaseConfig = {
            apiKey: "AIzaSyDEt_cOoOqAYpDnYWMKjhgmDiEjWNIp0vQ",
            authDomain: "spider-arm.firebaseapp.com",
            projectId: "spider-arm",
            storageBucket: "spider-arm.firebasestorage.app",
            messagingSenderId: "11285399463",
            appId: "1:11285399463:web:f59bb858d48ff45d869882",
            measurementId: "G-T9M5Q51575"
        };
        // /* FIREBASE_CONFIG_END */

        // Initialize Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Auth Logic
        window.loginWithGoogle = function() {
            signInWithPopup(auth, provider).catch(e => console.error("Login Error", e));
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'flex';
                console.log("Welcome,", user.displayName);
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('mainDashboard').style.display = 'none';
            }
        });
        
        // Status Heartbeat Listener
        onSnapshot(doc(db, "system_status", "agent"), (doc) => {
            const data = doc.data();
            const badge = document.getElementById('statusBadge');
            const pulse = document.getElementById('statusPulse');
            const label = document.getElementById('statusLabel');
            
            if (data && data.status === 'online' && data.last_seen) {
                const lastSeen = data.last_seen.toDate();
                const now = new Date();
                const diffSeconds = (now - lastSeen) / 1000;
                
                if (diffSeconds < 60) {
                    badge.style.color = "#4ade80";
                    pulse.style.display = "block";
                    label.innerText = "Agent Online";
                } else {
                    badge.style.color = "#9ca3af";
                    pulse.style.display = "none";
                    label.innerText = "Agent Offline";
                }
            } else {
                badge.style.color = "#9ca3af";
                pulse.style.display = "none";
                label.innerText = "Agent Offline";
            }
        });

        // Live Functionality
        window.sendCommand = async function() {
            const input = document.getElementById('cmdInput');
            const cmd = input.value;
            if (!cmd) return;
            
            addMessage(cmd, 'user');
            input.value = '';
            
            try {
                // Send to Firestore
                await addDoc(collection(db, "commands"), {
                    instruction: cmd,
                    status: "pending",
                    timestamp: new Date()
                });
            } catch (e) {
                console.error("Error adding document: ", e);
                addMessage("Error: Could not send command. Check Firebase console.", "bot");
            }
        }

        window.quickCmd = function(text) {
            document.getElementById('cmdInput').value = text;
            window.sendCommand();
        }

        // Listen for responses
        const q = query(collection(db, "commands"), orderBy("timestamp", "desc"), limit(10));
        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" || change.type === "modified") {
                    const data = change.doc.data();
                    if (data.status === "completed" && data.result) {
                        const resultData = data.result.data || data.result.message || data.result;
                        const formattedResult = typeof resultData === 'object' 
                            ? `<pre style="font-size:0.75rem; margin-top:0.5rem; background:rgba(0,0,0,0.2); padding:0.5rem; border-radius:0.5rem;">${JSON.stringify(resultData, null, 2)}</pre>`
                            : resultData;
                        addMessage(`<b>Result:</b> ${formattedResult}`, 'bot');
                    } else if (data.status === "request_confirmation") {
                        showSafety(data.message, change.doc.id);
                    }
                }
            });
        });

        function addMessage(text, side) {
            const container = document.getElementById('history');
            const msg = document.createElement('div');
            msg.className = `message ${side}`;
            msg.innerHTML = `${text}<span class="time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        let activeDocId = null;
        window.showSafety = function(msg, docId) {
            activeDocId = docId;
            document.getElementById('safetyMsg').innerText = msg;
            document.getElementById('safetyModal').style.display = 'flex';
        }

        window.confirmSafety = async function(approved) {
            document.getElementById('safetyModal').style.display = 'none';
            if (activeDocId) {
                const docRef = doc(db, "commands", activeDocId);
                await updateDoc(docRef, {
                    status: approved ? "approved" : "denied"
                });
                addMessage(approved ? "✅ Action Approved" : "❌ Action Denied", "bot");
                activeDocId = null;
            }
        }
    </script>
</body>
</html>
