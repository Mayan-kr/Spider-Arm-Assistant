<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Agent | Remote Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --accent: #c084fc;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(20px);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            position: relative;
        }

        header {
            text-align: center;
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            font-size: 0.8rem;
            color: #4ade80;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        .command-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button.send-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 0.75rem;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button.send-btn:active {
            transform: scale(0.9);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .action-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .action-btn .icon {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .action-btn .label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .history-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            padding: 1rem 0;
        }

        .message {
            max-width: 85%;
            padding: 1rem;
            border-radius: 1.25rem;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: slide-up 0.4s ease-out;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            border-bottom-right-radius: 0.25rem;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 0.25rem;
        }

        .message .time {
            display: block;
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 0.4rem;
        }

        /* Modal / Safety */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 2rem;
        }

        .modal {
            background: #1e1b4b;
            border: 2px solid #ef4444;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            max-width: 350px;
        }

        .modal h2 { margin-bottom: 1rem; font-size: 1.25rem; }
        .modal p { color: var(--text-dim); margin-bottom: 1.5rem; font-size: 0.9rem; }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .modal-actions button {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-approve { background: #10b981; color: white; }
        .btn-reject { background: #ef4444; color: white; }

    </style>
</head>
<body>
    <div class="phone-container">
        <header>
            <h1>Qwen AI</h1>
            <div class="status-badge">
                <div class="pulse"></div> Agent Online
            </div>
        </header>

        <div class="history-container" id="history">
            <div class="message bot">
                Hey Kumar! I'm ready to assist with your PC.
                <span class="time">09:00 AM</span>
            </div>
        </div>

        <div class="quick-actions">
            <div class="action-btn" onclick="quickCmd('Take a screenshot')">
                <span class="icon">📸</span>
                <span class="label">Screenshot</span>
            </div>
            <div class="action-btn" onclick="quickCmd('What is the CPU usage?')">
                <span class="icon">📊</span>
                <span class="label">PC Stats</span>
            </div>
            <div class="action-btn" onclick="quickCmd('Open calculator')">
                <span class="icon">🧮</span>
                <span class="label">App Launch</span>
            </div>
            <div class="action-btn" onclick="quickCmd('Type Success!')">
                <span class="icon">⌨️</span>
                <span class="label">Type Text</span>
            </div>
        </div>

        <div class="command-card">
            <div class="input-group">
                <input type="text" id="cmdInput" placeholder="Send a command...">
                <button class="send-btn" onclick="sendCommand()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Safety Confirmation Modal -->
    <div id="safetyModal" class="modal-overlay">
        <div class="modal">
            <h2 style="color: #ef4444;">🛡️ Security Alert</h2>
            <p id="safetyMsg">The agent wants to delete a file. Do you approve?</p>
            <div class="modal-actions">
                <button class="btn-approve" onclick="confirmSafety(true)">Approve</button>
                <button class="btn-reject" onclick="confirmSafety(false)">Deny</button>
            </div>
        </div>
    </div>

    <!-- Firebase Logic (Ready to Plug) -->
    <script type="module">
        // Live Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDEt_cOoOqAYpDnYWMKjhgmDiEjWNIp0vQ",
            authDomain: "spider-arm.firebaseapp.com",
            projectId: "spider-arm",
            storageBucket: "spider-arm.firebasestorage.app",
            messagingSenderId: "11285399463",
            appId: "1:11285399463:web:f59bb858d48ff45d869882",
            measurementId: "G-T9M5Q51575"
        };

        // Initialize Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Live Functionality
        window.sendCommand = async function() {
            const input = document.getElementById('cmdInput');
            const cmd = input.value;
            if (!cmd) return;
            
            addMessage(cmd, 'user');
            input.value = '';
            
            try {
                // Send to Firestore
                await addDoc(collection(db, "commands"), {
                    instruction: cmd,
                    status: "pending",
                    timestamp: new Date()
                });
            } catch (e) {
                console.error("Error adding document: ", e);
                addMessage("Error: Could not send command. Check Firebase console.", "bot");
            }
        }

        window.quickCmd = function(text) {
            document.getElementById('cmdInput').value = text;
            window.sendCommand();
        }

        // Listen for responses
        const q = query(collection(db, "commands"), orderBy("timestamp", "desc"), limit(10));
        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" || change.type === "modified") {
                    const data = change.doc.data();
                    if (data.status === "completed" && data.result) {
                        addMessage(`[Result] ${JSON.stringify(data.result.message || data.result.data || data.result)}`, 'bot');
                    } else if (data.status === "request_confirmation") {
                        showSafety(data.message, change.doc.id);
                    }
                }
            });
        });

        function addMessage(text, side) {
            const container = document.getElementById('history');
            const msg = document.createElement('div');
            msg.className = `message ${side}`;
            msg.innerHTML = `${text}<span class="time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        let activeDocId = null;
        window.showSafety = function(msg, docId) {
            activeDocId = docId;
            document.getElementById('safetyMsg').innerText = msg;
            document.getElementById('safetyModal').style.display = 'flex';
        }

        window.confirmSafety = async function(approved) {
            document.getElementById('safetyModal').style.display = 'none';
            if (activeDocId) {
                const docRef = doc(db, "commands", activeDocId);
                await updateDoc(docRef, {
                    status: approved ? "approved" : "denied"
                });
                addMessage(approved ? "✅ Action Approved" : "❌ Action Denied", "bot");
                activeDocId = null;
            }
        }
    </script>
</body>
</html>
